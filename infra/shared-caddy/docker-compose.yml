services:
  ask-router:
    build: ./ask-router
    container_name: shared-ask-router
    restart: unless-stopped
    expose:
      - "8081"
      - "8082"
    networks:
      - shared-edge-net

  caddy:
    image: caddy:2-alpine
    container_name: shared-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./conf.d:/etc/caddy/conf.d:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - shared-edge-net
    depends_on:
      - ask-router

networks:
  shared-edge-net:
    name: shared-edge-net
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
