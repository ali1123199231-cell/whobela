services:
  postgres:
    image: postgres:16-alpine
    container_name: whobela-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: whobela
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: whobela_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whobela -d whobela_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whobela-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://whobela:${POSTGRES_PASSWORD}@postgres:5432/whobela_prod
      JWT_SECRET: "${JWT_SECRET}"
      ROOT_DOMAIN: whobela.com
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
      APP_ENV: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - shared-edge-net

volumes:
  postgres_data:
  uploads_data:

networks:
  # Postgres must NOT join shared-edge-net: that network is shared with other
  # apps (smartlock2) whose own postgres containers also alias themselves as
  # "postgres", and Docker's embedded DNS picks one arbitrarily across the
  # whole network — this caused smartlock-backend to resolve "postgres" to
  # whobela's database and crash-loop on auth failure. Postgres only needs
  # to be reachable by this stack's own app container, via a private network.
  internal: {}
  shared-edge-net:
    external: true
